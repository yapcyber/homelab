[defaults]
inventory            = inventory/hosts.yml
roles_path           = roles
host_key_checking    = True
vault_password_file  = .vault_pass
interpreter_python   = /usr/bin/python3
retry_files_enabled  = False

[privilege_escalation]
become        = True
become_method = sudo

[ssh_connection]
# Une seule connexion TCP par hôte (au lieu d'une par tâche) : évite de
# déclencher la détection de brute-force SSH (incident du 2026-07-13).
pipelining = True
ssh_args   = -o ControlMaster=auto -o ControlPersist=600s

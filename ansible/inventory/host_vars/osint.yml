---
scheduled_tasks:
  - {name: docker-health, description: "Health-check horaire des conteneurs", calendar: hourly, script: docker-health.sh}
  - {name: backup, description: "Sauvegarde quotidienne scripts + rapports OSINT", calendar: "01:30", random_delay: 30m, script: backup.sh}

backup_jobs:
  10-osint-home: |
    { tar czf - -C /home/debian osint 2>/dev/null || [ $? -le 1 ]; } | enc > "$DAILY/osint.tar.gz.enc"
docker_restricted_ports: [5001]

---
scheduled_tasks:
  - {name: docker-health, description: "Health-check horaire des conteneurs", calendar: hourly, script: docker-health.sh}
  - {name: greenbone-feed, description: "Mise à jour quotidienne des feeds Greenbone", calendar: "02:30", random_delay: 20m, script: greenbone-feed.sh}
  - {name: backup, description: "Sauvegarde quotidienne base GVM", calendar: "01:30", random_delay: 30m, script: backup.sh}

backup_jobs:
  10-gvmd-db: |
    docker exec greenbone-community-edition-pg-gvm-1 sh -c 'pg_dumpall -U "${POSTGRES_USER:-postgres}"' | gzip > "$DAILY/gvmd-db.sql.gz"
  20-greenbone-deploy: |
    tar czf - -C /home/debian greenbone-community-container | enc > "$DAILY/greenbone-deploy.tar.gz.enc"
docker_restricted_ports: [443, 9392]

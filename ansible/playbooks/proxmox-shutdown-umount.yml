---
- name: Service de démontage NFS paresseux au shutdown (tous les nœuds)
  hosts: proxmox
  tasks:
    - name: Déployer le service nfs-shutdown-umount
      ansible.builtin.copy:
        dest: /etc/systemd/system/nfs-shutdown-umount.service
        owner: root
        group: root
        mode: '0644'
        content: |
          [Unit]
          Description=Démontage paresseux des NFS Proxmox au shutdown
          Before=shutdown.target
          [Service]
          Type=oneshot
          ExecStart=/bin/true
          ExecStop=/bin/sh -c 'umount -l -f -a -t nfs,nfs4 2>/dev/null || true'
          RemainAfterExit=yes
          [Install]
          WantedBy=multi-user.target

    - name: Activer le service
      ansible.builtin.systemd:
        name: nfs-shutdown-umount.service
        daemon_reload: true
        enabled: true
        state: started

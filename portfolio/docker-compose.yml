# =============================================================================
# portfolio/docker-compose.yml — Portfolio public en DMZ (VLAN 40)
# =============================================================================
# Déployé sur la VM DMZ (10.0.40.20), ISOLÉE du VLAN 30.
#
#   portfolio (nginx) : sert le site statique Docusaurus (build multi-stage).
#   cloudflared       : connecteur du tunnel « portfolio-homelab ». Il n'atteint
#                       QUE le nginx local (http://portfolio:80) — aucun accès au
#                       VLAN 30, pas de Traefik dans la boucle.
#
# Flux : Visiteur → Cloudflare (TLS + WAF au bord) → tunnel → cloudflared → nginx.
#
# À configurer côté Cloudflare (tunnel portfolio-homelab) :
#   Public Hostname : portfolio.yapserver.fr → http://portfolio:80
#
# Secret : CLOUDFLARE_TUNNEL_TOKEN livré via SOPS (portfolio.enc.env → .env 0600),
#          jamais committé en clair.
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PORTFOLIO — site statique Docusaurus servi par nginx (port 80)
  # ---------------------------------------------------------------------------
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: yapserver/portfolio:local
    container_name: portfolio
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - dmz
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # CLOUDFLARED — connecteur du tunnel, ne joint que le nginx local
  # ---------------------------------------------------------------------------
  cloudflared:
    image: cloudflare/cloudflared:2026.5.2
    container_name: portfolio-cloudflared
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - portfolio
    networks:
      - dmz

networks:
  dmz:
    driver: bridge

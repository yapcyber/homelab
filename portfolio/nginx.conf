server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Docusaurus génère des routes client-side.
    # try_files renvoie index.html pour toute route inconnue
    # → React Router gère la navigation côté client.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache long terme pour les assets hashés (JS, CSS, images)
    # Docusaurus génère des noms de fichiers avec hash (ex: main.a1b2c3d4.js)
    # Ces fichiers ne changent jamais → cache permanent = performances max
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";
    }

    # Headers de sécurité nginx (en complément des headers Traefik)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Compression gzip pour réduire la bande passante
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # Page d'erreur 404 → Docusaurus gère ça via index.html + client routing
    error_page 404 /404.html;
}

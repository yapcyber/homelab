# =============================================================================
# services/cloud/nextcloud/docker-compose.yml
# Nextcloud 34 (Cloud personnel + Talk) — réinstallation propre
# =============================================================================
# Derrière Traefik : OVERWRITE* + TRUSTED_PROXIES obligatoires (URLs https,
# clients desktop/mobile, partages de liens).
# Talk (spreed) installé cote app apres montee ; HPB deploye separement.
# =============================================================================

services:

  nextcloud-db:
    image: postgres:16-alpine
    container_name: nextcloud-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=nextcloud
      - POSTGRES_USER=nextcloud
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - nextcloud-internal

  nextcloud-redis:
    image: redis:7-alpine
    container_name: nextcloud-redis
    restart: unless-stopped
    command: --requirepass ${REDIS_PASSWORD}
    networks:
      - nextcloud-internal

  nextcloud:
    image: nextcloud:34.0.1-apache
    container_name: nextcloud
    restart: unless-stopped
    environment:
      - POSTGRES_HOST=nextcloud-db
      - POSTGRES_DB=nextcloud
      - POSTGRES_USER=nextcloud
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_HOST=nextcloud-redis
      - REDIS_HOST_PASSWORD=${REDIS_PASSWORD}
      - NEXTCLOUD_ADMIN_USER=admin
      - NEXTCLOUD_ADMIN_PASSWORD=${NEXTCLOUD_ADMIN_PASSWORD}
      - NEXTCLOUD_TRUSTED_DOMAINS=cloud.yapserver.fr
      - TRUSTED_PROXIES=10.0.30.10
      - OVERWRITEHOST=cloud.yapserver.fr
      - OVERWRITEPROTOCOL=https
      - OVERWRITECLIURL=https://cloud.yapserver.fr
    volumes:
      - nextcloud-data:/var/www/html
    ports:
      - "8080:80"
    depends_on:
      - nextcloud-db
      - nextcloud-redis
    networks:
      - nextcloud-internal
      - traefik-proxy

  nextcloud-cron:
    image: nextcloud:34.0.1-apache
    container_name: nextcloud-cron
    restart: unless-stopped
    entrypoint: /cron.sh
    volumes:
      - nextcloud-data:/var/www/html
    depends_on:
      - nextcloud-db
      - nextcloud-redis
    networks:
      - nextcloud-internal

volumes:
  db-data:
  nextcloud-data:

networks:
  nextcloud-internal:
    name: nextcloud-internal
  traefik-proxy:
    external: true
    name: traefik-proxy

#   Fichiers, contacts, calendriers, notes, partage de liens.
#   Accessible depuis l'extГ©rieur (famille, mobile, desktop via app native).
#
# ARCHITECTURE :
#
#   в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ
#   в”Ӯ  traefik-proxy                              в”Ӯ
#   в”Ӯ   в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ      в”Ӯ
#   в”Ӯ   в”Ӯ  nextcloud (Apache + PHP)        в”Ӯв—„в”Җв”Җв”Җв”Җв”Җв”Өв”Җв”Җ HTTPS depuis internet
#   в”Ӯ   в”Ӯ  nextcloud-cron (tГўches fond)    в”Ӯ      в”Ӯ
#   в”Ӯ   в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ      в”Ӯ
#   в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Ӯв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ
#                       в”Ӯ
#   в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Ӯв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ
#   в”Ӯ  nextcloud-internal (interne, isolГ©)         в”Ӯ
#   в”Ӯ   в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”Җв”Җв”җ  в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ  в”Ӯ
#   в”Ӯ   в”Ӯ  nextcloud-postgres  в”Ӯ  в”Ӯ   redis    в”Ӯ  в”Ӯ
#   в”Ӯ   в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ  в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ  в”Ӯ
#   в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ
#
# POINT CRITIQUE вҖ” Nextcloud derriГЁre un reverse proxy :
#   Sans les variables OVERWRITE*, Nextcloud gГ©nГЁre des URLs en http://
#   qui cassent les clients desktop/mobile et tous les partages de liens.
#   Les variables TRUSTED_PROXIES sont nГ©cessaires pour que Nextcloud
#   fasse confiance aux headers X-Forwarded-* envoyГ©s par Traefik.
# =============================================================================

services:

  nextcloud-db:
    image: postgres:16-alpine
    container_name: nextcloud-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=nextcloud
      - POSTGRES_USER=nextcloud
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - nextcloud-internal

  nextcloud-redis:
    image: redis:7-alpine
    container_name: nextcloud-redis
    restart: unless-stopped
    command: --requirepass ${REDIS_PASSWORD}
    networks:
      - nextcloud-internal

  nextcloud:
    image: nextcloud:29
    container_name: nextcloud
    restart: unless-stopped
    environment:
      - POSTGRES_HOST=nextcloud-db
      - POSTGRES_DB=nextcloud
      - POSTGRES_USER=nextcloud
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_HOST=nextcloud-redis
      - REDIS_HOST_PASSWORD=${REDIS_PASSWORD}
      - NEXTCLOUD_ADMIN_USER=admin
      - NEXTCLOUD_ADMIN_PASSWORD=${NEXTCLOUD_ADMIN_PASSWORD}
      - NEXTCLOUD_TRUSTED_DOMAINS=cloud.yapserver.fr
      - OVERWRITEPROTOCOL=https
      - OVERWRITECLIURL=https://cloud.yapserver.fr
    volumes:
      - nextcloud-data:/var/www/html
    ports:
      - "8080:80"
    depends_on:
      - nextcloud-db
      - nextcloud-redis
    networks:
      - nextcloud-internal
      - traefik-proxy

volumes:
  db-data:
  nextcloud-data:

networks:
  nextcloud-internal:
    name: nextcloud-internal
  traefik-proxy:
    external: true
    name: traefik-proxy

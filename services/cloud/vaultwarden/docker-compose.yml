services:
  vaultwarden:
    image: vaultwarden/server:1.36.0@sha256:d626d04934cd1192ad8ced1adb975099fca78cec33ab467d2d3c923cde7f3b0c   # épinglé version+digest (Renovate)
    container_name: vaultwarden
    restart: unless-stopped
    environment:
      - DOMAIN=https://vault.yapserver.fr
      - ADMIN_TOKEN=${ADMIN_TOKEN}
      # Comptes existants inchangés ; nouveaux comptes uniquement sur invitation admin.
      - SIGNUPS_ALLOWED=false
      - INVITATIONS_ALLOWED=true
      - WEBSOCKET_ENABLED=true
      - LOG_LEVEL=warn
    volumes:
      - ./data:/data
    ports:
      # Traefik inter-VM doit joindre ce port. Le filtrage DOCKER-USER limite
      # l'accès à Traefik et au VLAN Admin (rôle docker_ingress_filter).
      - "80:80"
    networks:
      - traefik-proxy

networks:
  traefik-proxy:
    external: true
    name: traefik-proxy

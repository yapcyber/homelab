# =============================================================================
# config/sunshine.conf — Configuration Sunshine
# =============================================================================
# Valide pour Linux (Docker) ET Windows (natif).
#
# Emplacement selon l'OS :
#   Linux Docker  : ./config/sunshine.conf (monté dans le container)
#   Linux natif   : ~/.config/sunshine/sunshine.conf
#   Windows natif : C:\Users\<USER>\AppData\Roaming\Sunshine\sunshine.conf
#
# La plupart des paramètres peuvent aussi être configurés via le Web UI
# (https://localhost:47990 ou https://10.0.90.20:47990 depuis le réseau).
# Ce fichier sert de référence et de backup de la configuration.
# =============================================================================

# =============================================================================
# IDENTITÉ DU SERVEUR
# =============================================================================
# Nom affiché dans la liste Moonlight (sur les appareils clients)
sunshine_name = Homelab Gaming PC

# =============================================================================
# ENCODAGE VIDÉO — Choisir selon le GPU disponible
# =============================================================================
# auto    → Sunshine choisit automatiquement le meilleur encoder disponible
# nvenc   → NVIDIA (RTX/GTX) — meilleure qualité, latence minimale
# qsv     → Intel Quick Sync (iGPU ou Arc) — très bon, faible latence
# vaapi   → AMD / Intel (API générique) — bon, parfois configuration requise
# software → CPU uniquement — éviter en production (latence élevée)
encoder = auto

# =============================================================================
# FRÉQUENCES D'IMAGES PROPOSÉES AUX CLIENTS
# =============================================================================
# Moonlight présentera ces options au client dans les paramètres de stream.
# Le client choisit selon les capacités de sa connexion et son écran.
fps = [30, 60, 90, 120]

# =============================================================================
# RÉSOLUTIONS PROPOSÉES AUX CLIENTS
# =============================================================================
# Format : largeur x hauteur
# Ajouter uniquement les résolutions supportées par le PC Gamer et le réseau.
# Note : La résolution du stream est indépendante de la résolution native
#        du moniteur branché au PC Gamer (virtuelle si pas de moniteur).
resolutions = [
  1280x720,
  1920x1080,
  2560x1440,
  3840x2160
]

# =============================================================================
# QUALITÉ VIDÉO
# =============================================================================
# Bitrate par défaut suggéré aux clients (en kbps)
# Recommendations selon la connexion :
#   LAN 1 Gbps     : 20000-50000 (1080p/60fps très fluide)
#   LAN 10 Gbps    : 50000-150000 (4K/120fps possible)
#   WireGuard WiFi : 10000-20000 (selon la bande passante disponible)
#   WireGuard 4G   : 5000-10000 (720p/60fps confortable)
min_bitrate = 5000
max_bitrate = 150000

# Mode H.265/HEVC — meilleure qualité à bitrate équivalent vs H.264
# 0 = désactivé, 1 = activé si supporté, 2 = activé (obligatoire)
# Désactiver si certains clients anciens ne supportent pas HEVC
hevc_mode = 1

# Mode AV1 — encore meilleur que HEVC mais support client limité (2023+)
# 0 = désactivé, 1 = activé si supporté
av1_mode = 0

# =============================================================================
# AUDIO
# =============================================================================
# Canal audio à capturer et streamer vers Moonlight
# Moonlight peut streamer le son du jeu vers le client TOUT EN le coupant
# ou le conservant sur les speakers du PC Gamer (configurable dans Moonlight)
audio_sink = default

# =============================================================================
# MANETTES VIRTUELLES
# =============================================================================
# Permet à Moonlight de contrôler des manettes virtuelles sur le PC Gamer.
# Très utile pour jouer avec une manette Bluetooth sur son téléphone.
gamepad = auto

# Nombre maximum de manettes simultanées (1-4)
controllers = 4

# =============================================================================
# WEB UI — Interface d'administration
# =============================================================================
# Port du Web UI (HTTPS)
port = 47990

# Origine autorisée pour les requêtes API (sécurité CORS)
# Mettre l'IP du Jump Host pour administration depuis le Mini PC 5
origin_web_ui_allowed = 10.0.0.0/8

# =============================================================================
# LOGS
# =============================================================================
# Niveau de log : trace=0, debug=1, info=2, warning=3, error=4, fatal=5
min_log_level = 2

# =============================================================================
# APPLICATIONS — Raccourcis de lancement (optionnel)
# =============================================================================
# Configurer les apps/jeux dans le Web UI sous l'onglet "Applications".
# Ils apparaîtront directement dans Moonlight pour un lancement rapide.
# Exemple : Steam en mode Big Picture pour jouer depuis le canapé.
#
# Pas de configuration dans ce fichier — le Web UI génère apps.json séparément.

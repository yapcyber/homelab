# SparkyFitness — provider OIDC + application + restriction au groupe "family".
# App familiale multi-utilisateurs : chaque membre se connecte avec son compte
# Authentik et retrouve son profil. Secret injecté via !Env (worker).
version: 1
metadata:
  name: app-sparkyfitness-oidc
entries:
  - id: provider-sparkyfitness
    model: authentik_providers_oauth2.oauth2provider
    identifiers:
      name: sparkyfitness-oidc
    attrs:
      name: sparkyfitness-oidc
      client_type: confidential
      client_id: b729722e593fed33de29f70bf0d3b24207cc0ca1
      client_secret: !Env SPARKYFITNESS_OIDC_CLIENT_SECRET
      sub_mode: hashed_user_id
      issuer_mode: per_provider
      include_claims_in_id_token: true
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, "authentik Self-signed Certificate"]]
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
      redirect_uris:
        # SparkyFitness (Better Auth) génère sa callback sous /api/auth/... ;
        # regex sur le domaine de l'app pour couvrir l'URI exacte.
        - url: "^https://fitness\\.yapserver\\.fr/.*$"
          matching_mode: regex
  - id: app-sparkyfitness
    model: authentik_core.application
    identifiers:
      slug: sparkyfitness
    attrs:
      name: SparkyFitness
      slug: sparkyfitness
      provider: !KeyOf provider-sparkyfitness
      policy_engine_mode: any
  - model: authentik_policies.policybinding
    identifiers:
      target: !KeyOf app-sparkyfitness
      group: !Find [authentik_core.group, [name, family]]
    attrs:
      order: 1
      enabled: true

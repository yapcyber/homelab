services:
  homarr:
    image: ghcr.io/homarr-labs/homarr:latest
    container_name: homarr
    restart: unless-stopped
    environment:
      - SECRET_ENCRYPTION_KEY=${SECRET_ENCRYPTION_KEY}
    volumes:
      - ./data/configs:/app/data/configs
      - ./data/icons:/app/public/icons
      # Socket Docker volontairement absent : Homarr ne peut pas contrôler l'hôte.
    networks:
      - traefik-proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.homarr.rule=Host(`home.yapserver.fr`)"
      - "traefik.http.routers.homarr.entrypoints=websecure"
      - "traefik.http.routers.homarr.tls.certresolver=cloudflare"
      - "traefik.http.routers.homarr.middlewares=internal-only@file,rate-limit@file"
      - "traefik.http.services.homarr.loadbalancer.server.port=7575"

networks:
  traefik-proxy:
    external: true
    name: traefik-proxy

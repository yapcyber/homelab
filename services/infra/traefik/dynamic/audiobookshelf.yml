http:
  routers:
    audiobookshelf:
      rule: "Host(`audiobooks.yapserver.fr`)"
      entrypoints: [websecure]
      tls: {certResolver: cloudflare}
      middlewares: [internal-only@file]
      service: audiobookshelf-svc

  services:
    audiobookshelf-svc:
      loadBalancer:
        servers:
          - url: "http://10.0.30.13:13378"

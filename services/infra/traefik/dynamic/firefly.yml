http:
  routers:
    firefly:
      rule: "Host(`firefly.yapserver.fr`)"
      entryPoints: [websecure]
      tls:
        certResolver: cloudflare
      middlewares: [internal-only@file, authentik@file]
      service: firefly-svc
  services:
    firefly-svc:
      loadBalancer:
        servers:
          - url: "http://10.0.30.16:8080"

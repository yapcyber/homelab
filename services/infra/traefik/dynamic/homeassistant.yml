http:
  routers:
    homeassistant:
      rule: "Host(`ha.yapserver.fr`)"
      entrypoints: [websecure]
      tls: {certResolver: cloudflare}
      middlewares: [internal-only@file]
      service: homeassistant-svc

  services:
    homeassistant-svc:
      loadBalancer:
        servers:
          - url: "http://10.0.30.12:8123"

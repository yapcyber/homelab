http:
  routers:
    fireflyimporter:
      rule: "Host(`importer.yapserver.fr`)"
      entryPoints: [websecure]
      tls:
        certResolver: cloudflare
      middlewares: [internal-only@file]
      service: fireflyimporter-svc
  services:
    fireflyimporter-svc:
      loadBalancer:
        servers:
          - url: "http://10.0.30.16:8081"

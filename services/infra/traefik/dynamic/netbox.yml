http:
  routers:
    netbox:
      rule: "Host(`netbox.yapserver.fr`)"
      entrypoints: [websecure]
      tls: {certResolver: cloudflare}
      middlewares: [internal-only@file]
      service: netbox-svc
  services:
    netbox-svc:
      loadBalancer:
        servers:
          - url: "http://10.0.30.11:8000"

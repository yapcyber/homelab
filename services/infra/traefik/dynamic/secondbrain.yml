http:
  routers:
    secondbrain:
      rule: "Host(`secondbrain.yapserver.fr`)"
      entrypoints: [websecure]
      tls: {certResolver: cloudflare}
      # VPN-only (internal-only) + SSO/MFA Authentik (forward-auth, provider secondbrain-proxy,
      # restreint au groupe admins). Backend = SiYuan, qui impose en plus son propre code
      # d'accès en mode serveur (double couche : Authentik SSO/MFA + code SiYuan).
      middlewares: [internal-only@file, authentik@file, security-headers@file]
      service: secondbrain-svc
      priority: 10

    # Route le handshake/callback de l'outpost vers Authentik (obligatoire en forward_single)
    secondbrain-outpost:
      rule: "Host(`secondbrain.yapserver.fr`) && PathPrefix(`/outpost.goauthentik.io/`)"
      entrypoints: [websecure]
      tls: {certResolver: cloudflare}
      service: authentik-outpost-svc
      priority: 20

  services:
    secondbrain-svc:
      loadBalancer:
        servers:
          - url: "http://10.0.30.12:6806"

services:

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:5.2.1_v2.0.12-ls459
    container_name: qbittorrent
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Paris
      - WEBUI_PORT=8080
    volumes:
      - ./config/qbittorrent:/config
      - /mnt/jellyfin/downloads:/downloads
    ports:
      - "8080:8080"
      - "6881:6881"
      - "6881:6881/udp"
    networks:
      - traefik-proxy

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:2.3.5.5327-ls147
    container_name: prowlarr
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Paris
    volumes:
      - ./config/prowlarr:/config
    ports:
      - "9696:9696"
    networks:
      - traefik-proxy

  radarr:
    image: lscr.io/linuxserver/radarr:6.1.1.10360-ls303
    container_name: radarr
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Paris
    volumes:
      - ./config/radarr:/config
      - /mnt/jellyfin/movies:/movies
      - /mnt/jellyfin/downloads:/downloads
    ports:
      - "7878:7878"
    networks:
      - traefik-proxy

  sonarr:
    image: lscr.io/linuxserver/sonarr:4.0.17.2952-ls312
    container_name: sonarr
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Paris
    volumes:
      - ./config/sonarr:/config
      - /mnt/jellyfin/shows:/shows
      - /mnt/jellyfin/downloads:/downloads
    ports:
      - "8989:8989"
    networks:
      - traefik-proxy

networks:
  traefik-proxy:
    external: true
    name: traefik-proxy

# =============================================================================
# services/media/docker-compose.yml
# Phase 1.2 — Stack Médias (Jellyfin + *arr + qBittorrent)
# =============================================================================
#
# FLUX COMPLET D'UN FILM DANS CETTE STACK :
#
#   1. Tu cherches "Inception" dans Radarr et tu l'ajoutes à ta watchlist.
#   2. Radarr interroge Prowlarr pour trouver un torrent correspondant.
#   3. Prowlarr agrège les résultats de tous tes indexeurs (YGG, etc.)
#      et retourne le meilleur torrent à Radarr.
#   4. Radarr envoie le lien à qBittorrent qui télécharge le fichier dans
#      /data/downloads/movies/
#   5. Radarr détecte la fin du téléchargement, vérifie la qualité,
#      et déplace le fichier (hardlink) vers /data/media/movies/Inception/
#   6. Jellyfin détecte automatiquement le nouveau fichier et l'ajoute
#      à la bibliothèque avec les métadonnées (pochette, synopsis, etc.)
#
# CONCEPT CLÉ — Structure /data à volume unique (TRaSH Guides) :
#
#   /data/
#   ├── downloads/
#   │   ├── movies/   ← qBittorrent télécharge ici
#   │   └── tv/       ← qBittorrent télécharge ici
#   └── media/
#       ├── movies/   ← Radarr déplace ici (hardlink, pas de copie)
#       └── tv/       ← Sonarr déplace ici (hardlink, pas de copie)
#
#   POURQUOI UN VOLUME UNIQUE ?
#   Si downloads/ et media/ sont sur des systèmes de fichiers DIFFÉRENTS,
#   Radarr/Sonarr doivent COPIER le fichier (lent, double l'espace disque).
#   Sur le MÊME système de fichiers, ils créent un HARDLINK :
#   deux pointeurs vers le même bloc de données → instantané, zéro espace.
#   qBittorrent peut continuer à seeder pendant que Jellyfin lit le fichier.
#
# HARDWARE ACCELERATION — Jellyfin + Intel QuickSync (Mini PC 1) :
#   Le décodage/encodage logiciel de H.264/HEVC 4K consomme 100% CPU.
#   Avec Intel QuickSync (VAAPI), Jellyfin délègue le transcodage au GPU intégré.
#   Résultat : 5-10% CPU au lieu de 100%, plusieurs streams simultanés.
#   Nécessite de passer le device /dev/dri depuis la VM Proxmox (Phase 3).
#
# PRÉ-REQUIS :
#   mkdir -p data/{downloads/{movies,tv},media/{movies,tv}}
#   cp .env.example .env && remplir les valeurs
# =============================================================================

services:

  # ===========================================================================
  # JELLYFIN — Serveur de médias
  # ===========================================================================
  # Alternative open-source à Plex/Emby. Zéro abonnement, zéro télémétrie.
  # Interface moderne, apps iOS/Android/TV disponibles.
  # Gère films, séries, musique, photos.
  # ===========================================================================
  jellyfin:
    image: jellyfin/jellyfin:${JELLYFIN_TAG}
    container_name: jellyfin
    restart: unless-stopped
    # user: "${PUID}:${PGID}"  # Décommenter si problèmes de permissions fichiers

    environment:
      TZ: ${TZ}
      JELLYFIN_PublishedServerUrl: "https://jellyfin.${DOMAIN}"

    volumes:
      - ./data/jellyfin/config:/config        # Config, métadonnées, base de données
      - ./data/jellyfin/cache:/cache          # Cache des images de couverture
      - ./data/media:/data/media:ro           # Bibliothèque médias en LECTURE SEULE
                                              # Jellyfin n'a pas besoin d'écrire dans les médias

    # -------------------------------------------------------------------------
    # HARDWARE ACCELERATION — Intel QuickSync / VAAPI
    # -------------------------------------------------------------------------
    # Décommenter en Phase 4 après avoir configuré le passthrough GPU dans Proxmox.
    # La VM Jellyfin (VLAN 30) doit avoir accès au /dev/dri de l'hôte Proxmox.
    #
    # Vérifier que le device existe sur la VM : ls -la /dev/dri/
    # Vérifier le GID du groupe 'render' : getent group render
    # Remplacer 109 par le GID réel si différent.
    #
    # devices:
    #   - /dev/dri/renderD128:/dev/dri/renderD128   # GPU Intel (QuickSync/VAAPI)
    # group_add:
    #   - "109"  # GID du groupe 'render' sur la VM hôte (variable selon distro)
    # -------------------------------------------------------------------------

    networks:
      - traefik-proxy
      - media-apps

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-proxy"

      # Jellyfin est le seul service média exposable à l'extérieur (streaming famille)
      # Certificat Cloudflare (Let's Encrypt) — accessible depuis internet
      # Les autres *arr restent internal-only avec certificat Step-CA
      - "traefik.http.routers.jellyfin.rule=Host(`jellyfin.${DOMAIN}`)"
      - "traefik.http.routers.jellyfin.entrypoints=websecure"
      - "traefik.http.routers.jellyfin.tls.certresolver=cloudflare"

      # PAS de middleware authentik sur Jellyfin : il a sa propre gestion des utilisateurs
      # PAS de internal-only : famille = accès depuis l'extérieur (Cloudflare Tunnel)
      - "traefik.http.routers.jellyfin.middlewares=rate-limit@file"

      - "traefik.http.services.jellyfin.loadbalancer.server.port=8096"

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8096/health > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ===========================================================================
  # RADARR — Gestionnaire de films
  # ===========================================================================
  # Surveille les films demandés, cherche des torrents via Prowlarr,
  # envoie à qBittorrent, gère la qualité et les upgrades automatiques.
  # ===========================================================================
  radarr:
    image: lscr.io/linuxserver/radarr:${RADARR_TAG}
    container_name: radarr
    restart: unless-stopped

    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}

    volumes:
      - ./data/radarr/config:/config
      - ./data:/data    # Accès complet à /data (downloads + media) pour les hardlinks
                        # CRITIQUE : même point de montage que qBittorrent
                        # → /data/downloads/movies et /data/media/movies
                        # sont sur le MÊME système de fichiers → hardlinks possibles

    networks:
      - traefik-proxy
      - media-apps

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-proxy"
      - "traefik.http.routers.radarr.rule=Host(`radarr.${DOMAIN}`)"
      - "traefik.http.routers.radarr.entrypoints=websecure"
      - "traefik.http.routers.radarr.tls.certresolver=step-ca"
      # Accès interne uniquement + SSO Authentik
      - "traefik.http.routers.radarr.middlewares=authentik@file,internal-only@file,rate-limit@file"
      - "traefik.http.services.radarr.loadbalancer.server.port=7878"

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:7878/ping > /dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ===========================================================================
  # SONARR — Gestionnaire de séries TV
  # ===========================================================================
  # Même principe que Radarr, spécialisé pour les séries.
  # Gère les saisons, épisodes, et upgrades de qualité automatiquement.
  # ===========================================================================
  sonarr:
    image: lscr.io/linuxserver/sonarr:${SONARR_TAG}
    container_name: sonarr
    restart: unless-stopped

    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}

    volumes:
      - ./data/sonarr/config:/config
      - ./data:/data    # Même logique que Radarr : /data/downloads/tv + /data/media/tv

    networks:
      - traefik-proxy
      - media-apps

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-proxy"
      - "traefik.http.routers.sonarr.rule=Host(`sonarr.${DOMAIN}`)"
      - "traefik.http.routers.sonarr.entrypoints=websecure"
      - "traefik.http.routers.sonarr.tls.certresolver=step-ca"
      - "traefik.http.routers.sonarr.middlewares=authentik@file,internal-only@file,rate-limit@file"
      - "traefik.http.services.sonarr.loadbalancer.server.port=8989"

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8989/ping > /dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ===========================================================================
  # PROWLARR — Agrégateur d'indexeurs
  # ===========================================================================
  # Centralise la gestion des indexeurs (sources de torrents) pour toute la stack.
  # Tu configures tes indexeurs UNE SEULE FOIS dans Prowlarr, il les synchronise
  # automatiquement avec Radarr ET Sonarr.
  # Sans Prowlarr, tu devrais configurer chaque indexeur dans chaque application.
  # ===========================================================================
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:${PROWLARR_TAG}
    container_name: prowlarr
    restart: unless-stopped

    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}

    volumes:
      - ./data/prowlarr/config:/config

    networks:
      - traefik-proxy
      - media-apps

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-proxy"
      - "traefik.http.routers.prowlarr.rule=Host(`prowlarr.${DOMAIN}`)"
      - "traefik.http.routers.prowlarr.entrypoints=websecure"
      - "traefik.http.routers.prowlarr.tls.certresolver=step-ca"
      - "traefik.http.routers.prowlarr.middlewares=authentik@file,internal-only@file,rate-limit@file"
      - "traefik.http.services.prowlarr.loadbalancer.server.port=9696"

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9696/ping > /dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ===========================================================================
  # QBITTORRENT — Client de téléchargement
  # ===========================================================================
  # Client torrent avec interface web. Reçoit les ordres de Radarr/Sonarr
  # et télécharge dans les bons sous-dossiers de /data/downloads/.
  #
  # SÉCURITÉ :
  #   qBittorrent est accessible uniquement via Traefik (internal-only).
  #   Le port 6881 (protocole torrent) n'est PAS exposé publiquement —
  #   le trafic sortant suffit pour la plupart des trackers.
  #
  # MOT DE PASSE INITIAL :
  #   Au premier démarrage, qBittorrent génère un mot de passe temporaire
  #   affiché dans les logs : docker logs qbittorrent | grep "temporary password"
  #   Le changer IMMÉDIATEMENT dans Settings → Web UI → Authentication.
  #
  # OPTIONNEL — VPN split-tunnel :
  #   Pour faire passer le trafic torrent par un VPN (Mullvad, ProtonVPN, etc.)
  #   sans affecter le reste du homelab, utiliser le plugin gluetun :
  #   https://github.com/qdm12/gluetun (ajouter comme sidecar container en Phase 4)
  # ===========================================================================
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:${QBITTORRENT_TAG}
    container_name: qbittorrent
    restart: unless-stopped

    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
      WEBUI_PORT: "8080"

    volumes:
      - ./data/qbittorrent/config:/config
      - ./data:/data    # qBittorrent écrit dans /data/downloads/{movies,tv}
                        # Radarr/Sonarr lisent depuis /data/downloads/ → hardlinks vers /data/media/

    # Port 6881 : protocole BitTorrent (TCP + UDP)
    # Pas besoin de l'ouvrir sur OPNsense pour le fonctionnement de base.
    # Si tu veux optimiser les connexions entrantes (seeding), ajouter une règle
    # de port forwarding sur OPNsense pour UDP 6881 → IP de la VM.
    ports:
      - "6881:6881/tcp"
      - "6881:6881/udp"

    networks:
      - traefik-proxy
      - media-apps

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-proxy"
      - "traefik.http.routers.qbittorrent.rule=Host(`torrent.${DOMAIN}`)"
      - "traefik.http.routers.qbittorrent.entrypoints=websecure"
      - "traefik.http.routers.qbittorrent.tls.certresolver=step-ca"
      - "traefik.http.routers.qbittorrent.middlewares=authentik@file,internal-only@file,rate-limit@file"
      - "traefik.http.services.qbittorrent.loadbalancer.server.port=8080"

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080 > /dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

# =============================================================================
# SERVICES OPTIONNELS — À décommenter selon besoins
# =============================================================================
#
#   BAZARR — Téléchargement automatique de sous-titres (FR/EN)
#   Synchronisé avec Radarr et Sonarr. Utilise OpenSubtitles, Subscene, etc.
#
#   bazarr:
#     image: lscr.io/linuxserver/bazarr:latest
#     container_name: bazarr
#     environment:
#       PUID: ${PUID}
#       PGID: ${PGID}
#       TZ: ${TZ}
#     volumes:
#       - ./data/bazarr/config:/config
#       - ./data/media:/data/media
#     networks:
#       - traefik-proxy
#       - media-apps
#     labels:
#       - "traefik.enable=true"
#       - "traefik.http.routers.bazarr.rule=Host(`bazarr.${DOMAIN}`)"
#       - "traefik.http.routers.bazarr.entrypoints=websecure"
#       - "traefik.http.routers.bazarr.tls.certresolver=step-ca"
#       - "traefik.http.routers.bazarr.middlewares=authentik@file,internal-only@file"
#       - "traefik.http.services.bazarr.loadbalancer.server.port=6767"
#
#   FLARESOLVERR — Contourne les protections Cloudflare des indexeurs
#   Nécessaire pour certains indexeurs (YGG Torrent notamment).
#   À référencer dans Prowlarr : Settings → Indexers → FlareSolverr Proxy.
#
#   flaresolverr:
#     image: ghcr.io/flaresolverr/flaresolverr:latest
#     container_name: flaresolverr
#     environment:
#       LOG_LEVEL: info
#       TZ: ${TZ}
#     networks:
#       - media-apps   # Pas besoin de traefik-proxy : jamais accédé directement
#     restart: unless-stopped
# =============================================================================

# =============================================================================
# RÉSEAUX
# =============================================================================
networks:
  # Réseau Traefik partagé (accès web UI)
  traefik-proxy:
    external: true
    name: traefik-proxy

  # Réseau interne aux services médias
  # PAS internal: true → qBittorrent a besoin d'accéder à internet pour télécharger
  # Les services ne peuvent pas être contactés depuis d'autres stacks
  # (Authentik, Netbox, etc.) car ils ne partagent pas ce réseau
  media-apps:
    name: media-apps

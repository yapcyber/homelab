services:
  jellyfin:
    image: jellyfin/jellyfin:10.11.11
    container_name: jellyfin
    restart: unless-stopped
    environment:
      - JELLYFIN_PublishedServerUrl=https://jellyfin.yapserver.fr
    volumes:
      - ./config:/config
      - ./cache:/cache
      - /mnt/jellyfin:/media:ro
      # PC gaming (10.0.90.100) — source additionnelle, intermittente.
      # rslave : le montage CIFS apparaît/disparaît dans le conteneur sans le
      # recréer. Bibliothèque à ajouter dans l'UI Jellyfin : /mnt/gaming/Jellyfin
      - type: bind
        source: /mnt/gaming
        target: /mnt/gaming
        read_only: true
        bind:
          propagation: rslave
    ports:
      - "8096:8096"
    networks:
      - traefik-proxy

networks:
  traefik-proxy:
    external: true
    name: traefik-proxy

services:
  jellystat-db:
    image: postgres:16.14
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes: [ "db:/var/lib/postgresql/data" ]
  jellystat:
    image: cyfershepard/jellystat:1.1.10@sha256:bb7ebe42424dedeff52d8da4130232d67e3fdd6dc2dd4a66091e32ddd835ea42
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_IP: jellystat-db
      POSTGRES_PORT: 5432
      JWT_SECRET: ${JWT_SECRET}
    ports: [ "3000:3000" ]
    volumes: [ "backup:/app/backend/backup-data" ]
    depends_on: [ jellystat-db ]
volumes: { db: {}, backup: {} }

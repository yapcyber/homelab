# =============================================================================
# services/media/navidrome/docker-compose.yml
# Navidrome — serveur de streaming musical (API Subsonic/OpenSubsonic)
# Compatible : DSub, Symfonium, Ultrasonic (mobile) ; Sublime Music (desktop) ;
#              Substreamer, Feishin (web/desktop) ; Supersonic (TV via Android).
# Bibliothèque partagée en lecture seule avec Lidarr : /mnt/jellyfin/music.
# =============================================================================
services:
  navidrome:
    image: deluan/navidrome:0.62.0
    container_name: navidrome
    restart: unless-stopped
    user: "1000:1000"
    environment:
      - ND_SCANSCHEDULE=@every 1h
      - ND_LOGLEVEL=info
      - ND_SESSIONTIMEOUT=24h
      - ND_BASEURL=
      - TZ=Europe/Paris
      # SSO Authentik : auth par header via forward-auth Traefik (web UI).
      # Seul Traefik (10.0.30.10) peut poser le header ; en accès direct
      # (apps Subsonic sur :4533), login/token Navidrome classiques.
      - ND_REVERSEPROXYWHITELIST=10.0.30.10/32
      - ND_REVERSEPROXYUSERHEADER=X-Authentik-Username
      # Racine musicale = dossier neutre /library (l'image réserve /music en
      # volume, on ne peut pas y créer de sous-points de montage).
      - ND_MUSICFOLDER=/library
    volumes:
      - ./data:/data
      # Navidrome ne scanne qu'UNE racine (/music) : on met les deux sources en
      # sous-dossiers. ⚠️ Le chemin NAS passe de /music à /music/nas → re-scan
      # complet au prochain démarrage (les compteurs d'écoute / favoris liés au
      # chemin sont réinitialisés ; bibliothèque récente donc impact faible).
      - /mnt/jellyfin/music:/library/nas:ro
      # PC gaming (10.0.90.100) — musique, intermittente. Placeholder local
      # /mnt/gaming/Navidrome garantit le démarrage même PC éteint ; un restart
      # de Navidrome est nécessaire quand le PC revient (bind d'un sous-dossier).
      - type: bind
        source: /mnt/gaming/Navidrome
        target: /library/gaming
        read_only: true
        bind:
          propagation: rslave
    ports:
      - "4533:4533"
    networks:
      - traefik-proxy

networks:
  traefik-proxy:
    external: true
    name: traefik-proxy

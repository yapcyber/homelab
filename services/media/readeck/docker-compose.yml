# =============================================================================
# services/media/readeck/docker-compose.yml
# Readeck — read-it-later auto-hébergé (sauvegarde d'articles web, lecture
# hors-ligne, annotations). Remplace Pocket/Instapaper.
# Données (SQLite + contenus) dans ./data.
# =============================================================================
services:
  readeck:
    image: codeberg.org/readeck/readeck@sha256:ed1c513f8e1d59b1d38fda324ac279eeb65afd0327907e498061ec9fd2f31c15   # épinglé par digest (Renovate)
    container_name: readeck
    restart: unless-stopped
    environment:
      - READECK_LOG_LEVEL=info
      - READECK_SERVER_HOST=0.0.0.0
      - READECK_SERVER_PORT=8000
      - READECK_ALLOWED_HOSTS=readeck.yapserver.fr,localhost
      - READECK_USE_X_FORWARDED=true
      - TZ=Europe/Paris
    ports:
      - "8000:8000"
    volumes:
      - ./data:/readeck

name: monitoring

services:
  docker-socket-proxy:
    image: ghcr.io/tecnativa/docker-socket-proxy:v0.4.2
    container_name: monitoring-docker-socket-proxy
    restart: unless-stopped
    environment:
      CONTAINERS: 1
      INFO: 1
      NETWORKS: 1
      POST: 0
      LOG_LEVEL: warning
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks: [docker-api]
    read_only: true
    tmpfs: [/run, /tmp]
    security_opt: [no-new-privileges:true]

  prometheus:
    image: prom/prometheus@sha256:3c42b892cf723fa54d2f262c37a0e1f80aa8c8ddb1da7b9b0df9455a35a7f893
    container_name: prometheus
    user: nobody
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks: [monitoring]
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter@sha256:9b0ade5e607f9dbedb0a8e11151b6011ae5bd79304c261804cfdd2cadf200a80
    container_name: node-exporter
    user: nobody
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($|/)
    volumes:
      - /:/rootfs:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    expose: ["9100"]
    networks: [monitoring]
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor@sha256:3de2bd5203120b866d74a9b283b2ffb8ec382fbf9dc321814700c6ea6f44ec57
    container_name: cadvisor
    privileged: false
    command:
      - --docker_only=true
      - --docker=tcp://docker-socket-proxy:2375
      - --housekeeping_interval=30s
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /run/containerd/containerd.sock:/run/containerd/containerd.sock:ro
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
      - label=disable
    expose: ["8080"]
    depends_on: [docker-socket-proxy]
    networks: [monitoring, docker-api]
    restart: unless-stopped

  loki:
    image: grafana/loki@sha256:70b9f699fc9bb868b62f1cfd4f787dfa50242f1fd92e6089787d5d7daea75fe8
    container_name: loki
    user: "10001"
    command:
      - -config.file=/etc/loki/loki.yml
    volumes:
      - ./config/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    networks: [monitoring]
    restart: unless-stopped

  promtail:
    image: grafana/promtail@sha256:6cfa64ec432b24a912d640e2edb940eeae2666f61861a66c121d763dd7241381
    container_name: promtail
    command:
      - -config.file=/etc/promtail/promtail.yml
    volumes:
      - ./config/promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/log:/var/log:ro
    depends_on: [loki]
    networks: [monitoring]
    restart: unless-stopped

  grafana:
    image: grafana/grafana@sha256:121a7a9ece6dc10b969f1f96eed64b4f07dfac0d0b8abc070f7cb83bbde86f63  # 13.0.1
    container_name: grafana
    user: "472"
    environment:
      - GF_SERVER_DOMAIN=grafana.yapserver.fr
      - GF_SERVER_ROOT_URL=https://grafana.yapserver.fr
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_AUTH_PROXY_ENABLED=true
      - GF_AUTH_PROXY_HEADER_NAME=X-authentik-username
      - GF_AUTH_PROXY_HEADER_PROPERTY=username
      - GF_AUTH_PROXY_AUTO_SIGN_UP=true
      - GF_AUTH_PROXY_HEADERS=Email:X-authentik-email Name:X-authentik-name
      - GF_AUTH_PROXY_WHITELIST=10.0.30.10
      - GF_AUTH_PROXY_ENABLE_LOGIN_TOKEN=false
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on: [prometheus]
    networks: [monitoring]
    restart: unless-stopped

networks:
  docker-api:
    name: monitoring-docker-api
    internal: true
  monitoring:
    name: monitoring

volumes:
  grafana-data:
    name: monitoring_grafana-data
  loki-data:
    name: monitoring_loki-data
  prometheus-data:
    name: monitoring_prometheus-data

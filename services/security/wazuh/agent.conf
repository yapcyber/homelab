  <agent_config>
    <syscheck>
      <directories check_all="yes" whodata="yes" report_changes="yes">/etc</directories>
      <directories check_all="yes" whodata="yes">/root/.ssh</directories>
      <directories check_all="yes" whodata="yes">/home/debian/.ssh</directories>
      <!-- Config des stacks Docker : intégrité, SANS realtime ni diff -->
      <directories check_all="yes">/home/debian/homelab</directories>
      <!-- Ignorer les données applicatives (DB, WAL, volumes, caches) -->
      <ignore type="sregex">/data/|/pgdata/|/pg_wal/|/postgres|/redis|/_data/|/volumes?/|/cache/|/uploads?/|\.log$|\.tmp$|\.swp$</ignore>
    </syscheck>
    <localfile>
      <log_format>syslog</log_format>
      <location>/var/log/unattended-upgrades/unattended-upgrades.log</location>
    </localfile>
  </agent_config>

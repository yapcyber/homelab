<!-- ===========================================================================
     ossec.conf — Configuration Wazuh Manager (Homelab yapserver.fr)
     ===========================================================================
     Ce fichier configure le comportement du SIEM pour l'ensemble du homelab.
     Il définit : ce qu'on surveille, comment on alerte, et quoi déclencher.

     ANATOMIE D'UNE ALERTE WAZUH :
       1. Un agent envoie un log au Manager (port 1514)
       2. Le Manager applique les decoders (parse le format du log)
       3. Les rules (règles) analysent le contenu du log décodé
       4. Si une règle correspond → alerte avec niveau de sévérité (1-15)
       5. L'alerte est envoyée à l'Indexer via Filebeat
       6. Le Dashboard la visualise

     NIVEAUX DE SÉVÉRITÉ :
       1-7   : Informatif / Bas (connexions SSH réussies, démarrages de services)
       8-11  : Moyen (tentatives d'authentification échouées, scans de ports)
       12-14 : Élevé (brute force confirmé, rootkit détecté, FIM critique)
       15    : Critique (alertes nécessitant intervention immédiate)
     =========================================================================== -->

<ossec_config>

  <!-- =========================================================================
       CONFIGURATION GLOBALE
       ========================================================================= -->
  <global>
    <jsonout_output>yes</jsonout_output>   <!-- Logs JSON = compatibles Wazuh Indexer -->
    <alerts_log>yes</alerts_log>
    <logall>no</logall>                   <!-- Ne pas logger TOUS les événements (trop volumineux) -->
    <logall_json>no</logall_json>
    <email_notification>no</email_notification>  <!-- Désactiver email, utiliser Authentik/Slack -->
    <smtp_server>localhost</smtp_server>
    <email_from>wazuh@yapserver.fr</email_from>
    <email_to>admin@yapserver.fr</email_to>
    <email_maxperhour>12</email_maxperhour>
    <email_log_source>alerts.log</email_log_source>
    <agents_disconnection_time>10m</agents_disconnection_time>
    <agents_disconnection_alert_time>0</agents_disconnection_alert_time>
  </global>

  <!-- =========================================================================
       LOGGING
       ========================================================================= -->
  <logging>
    <log_format>plain</log_format>
  </logging>

  <!-- =========================================================================
       ALERTES
       ========================================================================= -->
  <alerts>
    <log_alert_level>3</log_alert_level>   <!-- Logger les alertes niveau >= 3 -->
    <email_alert_level>12</email_alert_level>
  </alerts>

  <!-- =========================================================================
       RÉCEPTION SYSLOG RÉSEAU
       =========================================================================
       Wazuh reçoit les syslogs UDP de :
         - OPNsense (firewall rules, IDS/IPS, DHCP, VPN)
         - Security Onion (alertes NSM)
         - Switch Cisco (si configuré)

       Configuration OPNsense :
         System → Settings → Logging → Remote log servers
         → IP : 10.0.50.10 (IP VM Wazuh Manager dans VLAN 50)
         → Port : 514 / Protocol : UDP
         → Cocher : Firewall, DHCP, VPN, System

       Configuration Cisco 3560X (IOS) :
         logging 10.0.50.10
         logging trap warnings
       ========================================================================= -->
  <remote>
    <connection>syslog</connection>
    <port>514</port>
    <protocol>udp</protocol>
    <!-- Autoriser tous les équipements du réseau interne à envoyer des syslogs -->
    <allowed-ips>10.0.0.0/8</allowed-ips>
    <local_ip>0.0.0.0</local_ip>
  </remote>

  <!-- Agents connectés via TCP (tous les agents VMs) -->
  <remote>
    <connection>secure</connection>
    <port>1514</port>
    <protocol>tcp</protocol>
    <queue_size>131072</queue_size>
  </remote>

  <!-- =========================================================================
       RÉPONSE ACTIVE
       =========================================================================
       Wazuh peut réagir automatiquement à certaines menaces.
       ATTENTION : Activer avec prudence — une fausse alerte peut bloquer
       un accès légitime. Recommandé de mettre en mode "log only" d'abord.

       Exemples d'actions automatiques possibles :
         - Bloquer une IP via pf (OPNsense) après trop d'échecs SSH
         - Redémarrer un service après une anomalie
         - Isoler une VM en modifiant les règles firewall
       ========================================================================= -->
  <active-response>
    <disabled>no</disabled>
    <ca_store>/var/ossec/etc/wpk_root.pem</ca_store>
    <ca_verification>yes</ca_verification>
  </active-response>

  <!-- =========================================================================
       DÉTECTION DE VULNÉRABILITÉS
       =========================================================================
       Wazuh collecte l'inventaire des paquets installés sur chaque agent
       et les compare aux CVEs connus (NVD, Canonical, RedHat, etc.).
       Résultat visible dans Dashboard → Vulnerability Detection.

       Mise à jour des feeds CVE toutes les 60 minutes.
       ========================================================================= -->
  <vulnerability-detection>
    <enabled>yes</enabled>
    <index-status>yes</index-status>
    <feed-update-interval>60m</feed-update-interval>
  </vulnerability-detection>

  <!-- =========================================================================
       DOCKER LISTENER
       =========================================================================
       Surveille les événements Docker sur les VMs où le socket Docker
       est accessible. Détecte : création/suppression de containers, images
       pulling depuis des sources inconnues, privilege escalation via Docker.

       Requiert que l'agent ait accès au socket Docker :
       Sur la VM cible : usermod -aG docker wazuh-agent
       ========================================================================= -->
  <wodle name="docker-listener">
    <disabled>no</disabled>
    <interval>10m</interval>
    <attempts>5</attempts>
    <run_on_start>yes</run_on_start>
  </wodle>

  <!-- =========================================================================
       INVENTAIRE SYSTÈME (SCA — Security Configuration Assessment)
       =========================================================================
       Scans périodiques de conformité : vérifie que les VMs respectent
       les bonnes pratiques de sécurité (CIS Benchmarks, etc.)
       Visible dans Dashboard → Security Configuration Assessment.
       ========================================================================= -->
  <wodle name="syscollector">
    <disabled>no</disabled>
    <interval>1h</interval>
    <scan_on_start>yes</scan_on_start>
    <hardware>yes</hardware>       <!-- Inventaire matériel (CPU, RAM, disques) -->
    <os>yes</os>                   <!-- Informations OS et kernel -->
    <network>yes</network>         <!-- Interfaces réseau et routes -->
    <packages>yes</packages>       <!-- Paquets installés (pour CVE detection) -->
    <ports all="no">yes</ports>    <!-- Ports en écoute -->
    <processes>yes</processes>     <!-- Processus en cours d'exécution -->
  </wodle>

  <!-- =========================================================================
       FILE INTEGRITY MONITORING (FIM)
       =========================================================================
       Surveille les modifications de fichiers critiques.
       Détecte : modifications non autorisées de configs, backdoors,
       installation de rootkits, modifications de binaires système.

       Fréquence : 43200 secondes (12h)
       Scan au démarrage : oui
       ========================================================================= -->
  <syscheck>
    <disabled>no</disabled>
    <frequency>43200</frequency>
    <scan_on_start>yes</scan_on_start>
    <alert_new_files>yes</alert_new_files>
    <auto_ignore frequency="10" timeframe="3600">no</auto_ignore>

    <!-- Dossiers critiques à surveiller (Manager lui-même) -->
    <directories realtime="yes" report_changes="yes" check_all="yes">/etc/traefik,/etc/ssl</directories>
    <directories check_all="yes">/usr/bin,/usr/sbin,/bin,/sbin</directories>
    <directories check_all="yes">/etc,/boot</directories>

    <!-- Dossiers Docker à surveiller pour détecter des modifications de configs -->
    <directories realtime="yes" report_changes="yes">/opt/homelab/services</directories>

    <!-- Exclusions (trop de faux positifs) -->
    <ignore>/etc/mtab</ignore>
    <ignore>/etc/hosts.deny</ignore>
    <ignore>/etc/adjtime</ignore>
    <ignore type="sregex">.log$|.tmp$|.swp$|.pid$</ignore>
    <skip_nfs>yes</skip_nfs>
    <skip_dev>yes</skip_dev>
    <skip_proc>yes</skip_proc>

    <!-- Synchronisation de l'état FIM avec le Dashboard -->
    <synchronization>
      <enabled>yes</enabled>
      <interval>5m</interval>
    </synchronization>
  </syscheck>

  <!-- =========================================================================
       SOURCES DE LOGS LOCAUX (Manager lui-même)
       ========================================================================= -->

  <!-- Logs d'actions des agents Wazuh -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/ossec/logs/active-responses.log</location>
  </localfile>

  <!-- Logs Wazuh Manager -->
  <localfile>
    <log_format>ossec</log_format>
    <location>ossec</location>
  </localfile>

  <!-- =========================================================================
       INTÉGRATIONS EXTERNES (Phase 5 — activer selon besoins)
       =========================================================================

       SLACK — Alertes critiques (niveau 12+) sur un channel dédié :
       <integration>
         <name>slack</name>
         <hook_url>https://hooks.slack.com/services/XXX/YYY/ZZZ</hook_url>
         <alert_format>json</alert_format>
         <level>12</level>
       </integration>

       VIRUSTOTAL — Enrichissement automatique des IoCs (hashes malveillants) :
       <integration>
         <name>virustotal</name>
         <api_key>VOTRE_CLE_VIRUSTOTAL</api_key>
         <group>syscheck</group>
         <alert_format>json</alert_format>
       </integration>
       ========================================================================= -->

</ossec_config>

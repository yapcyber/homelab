# =============================================================================
# services/security/wazuh/docker-compose.yml
# Phase 1.2 — Wazuh SIEM (Manager + Indexer + Dashboard)
# =============================================================================
#
# RÔLE DE WAZUH :
#   Wazuh est ton centre opérationnel de sécurité (SOC).
#   Il centralise, corrèle et alerte sur tous les événements de sécurité
#   de TOUTE l'infrastructure (VMs, containers, réseau, fichiers).
#
# TROIS COMPOSANTS INDISSOCIABLES :
#
#   ┌─────────────────────────────────────────────────────────────────┐
#   │  Wazuh Manager                                                  │
#   │  ← Reçoit les logs de tous les agents (port 1514)              │
#   │  ← Reçoit les syslogs réseau d'OPNsense (port 514/udp)         │
#   │  ← Reçoit les logs Security Onion (port 514/udp)               │
#   │  → Analyse, corrèle, génère des alertes                        │
#   │  → Envoie les alertes à l'Indexer via Filebeat (TLS)           │
#   └───────────────────────────┬─────────────────────────────────────┘
#                               │
#   ┌───────────────────────────▼─────────────────────────────────────┐
#   │  Wazuh Indexer (OpenSearch)                                     │
#   │  Stocke TOUS les événements et alertes (moteur de recherche)    │
#   │  Base de données des vulnérabilités CVE                         │
#   └───────────────────────────┬─────────────────────────────────────┘
#                               │
#   ┌───────────────────────────▼─────────────────────────────────────┐
#   │  Wazuh Dashboard (OpenSearch Dashboards)                        │
#   │  Interface web de visualisation, recherche, alertes             │
#   │  Exposé via Traefik (internal-only + Authentik)                 │
#   └─────────────────────────────────────────────────────────────────┘
#
# AGENTS : Installés sur TOUTES les VMs (VLAN 30, 40, 50, 60, etc.)
#   Connectent vers Manager sur port 1514 (TCP) + 1515 (enregistrement)
#   → Règle firewall OPNsense : tous les VLANs → VLAN 50 :1514 et :1515
#
# ⚠️  PRÉ-REQUIS SYSTÈME OBLIGATOIRE avant docker compose up :
#   echo "vm.max_map_count=262144" >> /etc/sysctl.conf && sysctl -p
#   (OpenSearch/Wazuh Indexer refuse de démarrer sans ça)
#
# ⚠️  CERTIFICATS à générer avant la première exécution :
#   docker compose -f generate-certs.yml run --rm generator
#
# RESSOURCES RECOMMANDÉES pour cette VM (VLAN 50 - SOC) :
#   RAM : 8 Go minimum (16 Go recommandé)
#   CPU : 4 vCPUs
#   Disque : 50 Go minimum (les logs grossissent vite)
#   Allouer sur Node 1 ou Node 3 (32 Go RAM disponibles)
# =============================================================================

services:

  # ===========================================================================
  # WAZUH MANAGER — Cerveau du SIEM
  # ===========================================================================
  # Reçoit et analyse les logs de tous les agents et sources réseau.
  # Filebeat (intégré) envoie les alertes traitées vers l'Indexer.
  # ===========================================================================
  wazuh-manager:
    image: wazuh/wazuh-manager:${WAZUH_VERSION}
    container_name: wazuh-manager
    hostname: wazuh-manager
    restart: unless-stopped
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 655360
        hard: 655360

    environment:
      INDEXER_URL: https://wazuh-indexer:9200
      INDEXER_USERNAME: admin
      INDEXER_PASSWORD: ${WAZUH_INDEXER_PASSWORD}
      FILEBEAT_SSL_VERIFICATION_MODE: full
      SSL_CERTIFICATE_AUTHORITIES: /etc/ssl/root-ca.pem
      SSL_CERTIFICATE: /etc/ssl/filebeat.pem
      SSL_KEY: /etc/ssl/filebeat.key
      API_USERNAME: wazuh-wui
      API_PASSWORD: ${WAZUH_API_PASSWORD}

    ports:
      # Agents → Manager (événements de sécurité en temps réel)
      - "1514:1514"
      # Enregistrement des nouveaux agents (génération de clés)
      - "1515:1515"
      # Syslog UDP — reçoit les logs OPNsense et Security Onion
      # OPNsense : Syslog → Remote → 10.0.50.10:514 UDP
      - "514:514/udp"
      # API REST Wazuh (utilisée par le Dashboard et les intégrations)
      # Accessible uniquement depuis VLAN 50 et VLAN 100 (Jump Host)
      - "55000:55000"

    volumes:
      # Données persistantes du Manager
      - ./data/manager/api:/var/ossec/api/configuration
      - ./data/manager/etc:/var/ossec/etc
      - ./data/manager/logs:/var/ossec/logs
      - ./data/manager/queue:/var/ossec/queue
      - ./data/manager/wodles:/var/ossec/wodles
      - ./data/manager/filebeat:/etc/filebeat

      # Configuration personnalisée du homelab
      - ./config/wazuh_manager/ossec.conf:/var/ossec/etc/ossec.conf:ro

      # Certificats TLS internes Wazuh (générés par generate-certs.yml)
      - ./data/certs/root-ca-manager.pem:/etc/ssl/root-ca.pem:ro
      - ./data/certs/wazuh-manager.pem:/etc/ssl/filebeat.pem:ro
      - ./data/certs/wazuh-manager-key.pem:/etc/ssl/filebeat.key:ro

    networks:
      - wazuh-net

    healthcheck:
      test: ["CMD-SHELL", "curl -k -fsS https://localhost:55000/ -u wazuh-wui:${WAZUH_API_PASSWORD} > /dev/null"]
      interval: 60s
      timeout: 15s
      retries: 5
      start_period: 120s

  # ===========================================================================
  # WAZUH INDEXER — Stockage et recherche (OpenSearch)
  # ===========================================================================
  # Stocke tous les événements, alertes et inventaires de vulnérabilités.
  # Moteur de recherche full-text sur tous les logs de sécurité.
  #
  # ⚠️  vm.max_map_count=262144 OBLIGATOIRE sur l'hôte (voir init.sh)
  # ===========================================================================
  wazuh-indexer:
    image: wazuh/wazuh-indexer:${WAZUH_VERSION}
    container_name: wazuh-indexer
    hostname: wazuh-indexer
    restart: unless-stopped
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536

    environment:
      # JVM heap size — règle des 50% : allouer 50% de la RAM disponible à l'indexer
      # Sur une VM de 8 Go → WAZUH_INDEXER_JVM_HEAP=4g
      # Sur une VM de 16 Go → WAZUH_INDEXER_JVM_HEAP=8g
      # Ne jamais dépasser 31g (limite JVM compressed oops)
      OPENSEARCH_JAVA_OPTS: "-Xms${WAZUH_INDEXER_JVM_HEAP} -Xmx${WAZUH_INDEXER_JVM_HEAP}"
      bootstrap.memory_lock: "true"
      WAZUH_INDEXER_ADMIN_PASSWORD: ${WAZUH_INDEXER_PASSWORD}

    volumes:
      - ./data/indexer:/var/lib/wazuh-indexer

      # Certificats TLS internes
      - ./data/certs/root-ca.pem:/usr/share/wazuh-indexer/certs/root-ca.pem:ro
      - ./data/certs/wazuh-indexer-key.pem:/usr/share/wazuh-indexer/certs/wazuh-indexer.key:ro
      - ./data/certs/wazuh-indexer.pem:/usr/share/wazuh-indexer/certs/wazuh-indexer.pem:ro
      - ./data/certs/admin.pem:/usr/share/wazuh-indexer/certs/admin.pem:ro
      - ./data/certs/admin-key.pem:/usr/share/wazuh-indexer/certs/admin-key.pem:ro

      - ./config/wazuh_indexer/internal_users.yml:/usr/share/wazuh-indexer/opensearch-security/internal_users.yml

    networks:
      - wazuh-net

    healthcheck:
      test: ["CMD-SHELL", "curl -k -fsS https://localhost:9200 -u admin:${WAZUH_INDEXER_PASSWORD} > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  # ===========================================================================
  # WAZUH DASHBOARD — Interface web (OpenSearch Dashboards)
  # ===========================================================================
  # Visualisation des alertes, compliance (PCI-DSS, HIPAA, GDPR),
  # inventaire des agents, vulnérabilités, intégrité des fichiers.
  #
  # Exposé via Traefik avec double protection :
  #   - internal-only (uniquement depuis LAN/WireGuard)
  #   - authentik (SSO)
  # ===========================================================================
  wazuh-dashboard:
    image: wazuh/wazuh-dashboard:${WAZUH_VERSION}
    container_name: wazuh-dashboard
    hostname: wazuh-dashboard
    restart: unless-stopped

    environment:
      OPENSEARCH_HOSTS: '["https://wazuh-indexer:9200"]'
      INDEXER_USERNAME: admin
      INDEXER_PASSWORD: ${WAZUH_INDEXER_PASSWORD}
      WAZUH_API_URL: https://wazuh-manager
      DASHBOARD_USERNAME: kibanaserver
      DASHBOARD_PASSWORD: ${WAZUH_DASHBOARD_PASSWORD}
      API_USERNAME: wazuh-wui
      API_PASSWORD: ${WAZUH_API_PASSWORD}

    volumes:
      - ./config/wazuh_dashboard/opensearch_dashboards.yml:/usr/share/wazuh-dashboard/config/opensearch_dashboards.yml:ro

      # Certificats TLS
      - ./data/certs/wazuh-dashboard.pem:/usr/share/wazuh-dashboard/certs/wazuh-dashboard.pem:ro
      - ./data/certs/wazuh-dashboard-key.pem:/usr/share/wazuh-dashboard/certs/wazuh-dashboard.key:ro
      - ./data/certs/root-ca.pem:/usr/share/wazuh-dashboard/certs/root-ca.pem:ro

    networks:
      - traefik-proxy
      - wazuh-net

    depends_on:
      wazuh-indexer:
        condition: service_healthy
      wazuh-manager:
        condition: service_healthy

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-proxy"

      # Service SOC — interne uniquement + SSO Authentik
      - "traefik.http.routers.wazuh.rule=Host(`wazuh.${DOMAIN}`)"
      - "traefik.http.routers.wazuh.entrypoints=websecure"
      - "traefik.http.routers.wazuh.tls.certresolver=step-ca"
      - "traefik.http.routers.wazuh.middlewares=authentik@file,internal-only@file,rate-limit@file"
      - "traefik.http.services.wazuh.loadbalancer.server.port=5601"

    healthcheck:
      test: ["CMD-SHELL", "curl -k -fsS https://localhost:5601/api/status > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

networks:
  traefik-proxy:
    external: true
    name: traefik-proxy

  # Réseau interne Wazuh — Manager ↔ Indexer ↔ Dashboard
  # NOT internal: true → le Manager doit télécharger les CVE feeds depuis internet
  wazuh-net:
    name: wazuh-net
